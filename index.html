<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Barlow',sans-serif;
  background:#0a0a0f;
  color:#f0ede8;
  min-height:100vh;
  overflow-x:hidden;
}

:root{
  --green:#2eff8a;
  --orange:#ff6b2b;
  --blue:#3b8aff;
  --red:#ff3b3b;

  --bg:#0a0a0f;
  --bg2:#141419;
  --bg3:#1e1e26;
  --bg4:#28282f;

  --border:#2a2a35;

  --text:#f0ede8;
  --text2:#9994a0;
  --text3:#5a5568;

  --radius:12px;
  --radius-lg:18px;
}

/* ===== GLOBAL ===== */

.screen{
  display:none;
  flex-direction:column;
  min-height:100vh;
}

.screen.active{
  display:flex;
}

/* ===== HEADER ===== */

.header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:16px 20px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:10;
}

.header h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
  font-weight:800;
  letter-spacing:1px;
  text-transform:uppercase;
  flex:1;
}

.back-btn{
  background:none;
  border:none;
  color:var(--text2);
  font-size:22px;
  cursor:pointer;
}

.content{
  flex:1;
  padding:16px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ===== CARDS ===== */

.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  cursor:pointer;
}

.card:active{
  background:var(--bg3);
}

.card-row{
  display:flex;
  align-items:center;
  gap:12px;
}

.card-icon{
  width:42px;
  height:42px;
  border-radius:10px;
  background:var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  flex-shrink:0;
}

.card-info{
  flex:1;
}

.card-info h3{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;
  font-weight:700;
  text-transform:uppercase;
}

.card-info p{
  font-size:13px;
  color:var(--text2);
}

.card-arrow{
  color:var(--text3);
  font-size:16px;
}

/* ===== BUTTONS ===== */

.btn{
  border:none;
  border-radius:12px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
}

.btn-primary{
  background:var(--green);
  color:#000;
}

.btn-secondary{
  background:var(--bg3);
  color:var(--text);
  border:1px solid var(--border);
}

.btn-danger{
  background:var(--red);
  color:#fff;
}

.btn-sm{
  padding:8px 14px;
  font-size:14px;
}

.btn-full{
  width:100%;
}

.btn-large{
  padding:18px;
  font-size:22px;
}

/* ===== INPUTS ===== */

.input-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.input-group label{
  font-size:13px;
  color:var(--text2);
  text-transform:uppercase;
  font-weight:600;
}

.inp{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  padding:12px 14px;
  font-size:15px;
  outline:none;
}

.inp:focus{
  border-color:var(--blue);
}

/* ===== CHIPS ===== */

.chips{
  display:flex;
  gap:8px;
}

.chip{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  cursor:pointer;
}

.chip.active{
  background:var(--green);
  color:#000;
  border-color:var(--green);
}

/* ===== EXERCISE LIST ===== */

.ex-item{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.ex-name{
  font-size:15px;
  font-weight:600;
}

.ex-meta{
  font-size:13px;
  color:var(--text2);
}

.ex-del{
  background:none;
  border:none;
  color:var(--red);
  font-size:18px;
  cursor:pointer;
}

/* ===== WORKOUT ===== */

.workout-bg{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.progress-bar{
  height:4px;
  background:var(--bg3);
}

.progress-fill{
  height:100%;
  background:var(--green);
  width:0%;
  transition:width .4s;
}

.exercise-counter{
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.ex-count-label{
  font-size:13px;
  color:var(--text2);
  text-transform:uppercase;
  font-weight:600;
}

.workout-main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.phase-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--text2);
  margin-bottom:10px;
}

.ex-name-big{
  font-family:'Barlow Condensed',sans-serif;
  font-size:38px;
  font-weight:800;
  line-height:1.1;
  text-transform:uppercase;
  margin-bottom:8px;
}

.ex-desc{
  color:var(--text2);
  margin-bottom:24px;
  font-size:14px;
}

.timer-wrap{
  position:relative;
  width:200px;
  height:200px;
  margin-bottom:24px;
}

.timer-svg{
  transform:rotate(-90deg);
}

.timer-track{
  fill:none;
  stroke:var(--bg3);
  stroke-width:10;
}

.timer-arc{
  fill:none;
  stroke-width:10;
  stroke-linecap:round;
}

.timer-text{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.timer-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:64px;
  font-weight:800;
}

.timer-unit{
  font-size:13px;
  color:var(--text2);
}

.reps-display{
  font-family:'Barlow Condensed',sans-serif;
  font-size:84px;
  color:var(--green);
  font-weight:800;
}

.bottom-bar{
  padding:16px 20px 28px;
  background:var(--bg2);
  border-top:1px solid var(--border);
}

.next-preview{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px 18px;
  margin:0 20px 10px;
  display:flex;
  align-items:center;
  gap:12px;
}

.next-icon{
  width:38px;
  height:38px;
  border-radius:9px;
  background:var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
}

.next-label{
  font-size:12px;
  color:var(--text2);
  text-transform:uppercase;
}

.next-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;
  text-transform:uppercase;
}

.finish-overlay{
  display:none;
  min-height:100vh;
  padding:30px;
  text-align:center;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.finish-overlay.active{
  display:flex;
}

.finish-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:42px;
  color:var(--green);
  text-transform:uppercase;
  margin-bottom:10px;
}

.finish-stats{
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:24px 0 32px;
}

.stat-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}

.stat-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;
  color:var(--green);
  font-weight:800;
}

.stat-label{
  font-size:12px;
  color:var(--text2);
  text-transform:uppercase;
}

.section-title{
  font-size:13px;
  color:var(--text2);
  text-transform:uppercase;
  font-weight:600;
}

.empty-state{
  text-align:center;
  padding:40px 20px;
  color:var(--text2);
}

.row{
  display:flex;
  gap:10px;
}

.row>*{
  flex:1;
}

.countdown-pulse{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.45}
}
</style>
</head>

<body>

<!-- ===== HOME ===== -->

<div class="screen active" id="screen-home">

  <div class="header">
    <h1>💪 Treningi</h1>

    <button
      class="btn btn-secondary btn-sm"
      onclick="showCreateScreen()">
      + Nowy trening
    </button>
  </div>

  <div class="content" id="home-list"></div>

</div>

<!-- ===== CREATE ===== -->

<div class="screen" id="screen-create">

  <div class="header">
    <button class="back-btn" onclick="showScreen('screen-home')">‹</button>
    <h1 id="create-title">Nowy zestaw</h1>
  </div>

  <div class="content">

    <div class="input-group">
      <label>Nazwa zestawu</label>
      <input class="inp" id="set-name">
    </div>

    <p class="section-title">Ćwiczenia</p>

    <div id="exercises-list"></div>

    <button
      class="btn btn-secondary btn-full"
      style="padding:14px"
      onclick="showAddExercise()">
      + Dodaj ćwiczenie
    </button>

    <div
      id="add-exercise-panel"
      style="
      display:none;
      background:var(--bg3);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      flex-direction:column;
      gap:12px">

      <div class="input-group">
        <label>Nazwa</label>
        <input class="inp" id="ex-name-inp">
      </div>

      <div class="input-group">
        <label>Opis</label>
        <input class="inp" id="ex-desc-inp">
      </div>

      <div class="chips">
        <div class="chip active" id="chip-reps" onclick="selectType('reps')">
          🔢 Powtórzenia
        </div>

        <div class="chip" id="chip-time" onclick="selectType('time')">
          ⏱️ Czas
        </div>
      </div>

      <div id="reps-fields">
        <div class="input-group">
          <label>Powtórzenia</label>
          <input class="inp" id="ex-reps-inp" type="number">
        </div>
      </div>

      <div id="time-fields" style="display:none">
        <div class="input-group">
          <label>Sekundy</label>
          <input class="inp" id="ex-time-inp" type="number">
        </div>
      </div>

      <div class="row">
        <button class="btn btn-secondary btn-sm" onclick="hideAddPanel()">
          Anuluj
        </button>

        <button class="btn btn-primary btn-sm" onclick="addExercise()">
          Dodaj
        </button>
      </div>

    </div>

  </div>

  <div class="bottom-bar">

    <div class="row">

      <button
        id="delete-set-btn"
        class="btn btn-danger btn-sm"
        style="display:none"
        onclick="deleteCurrentSet()">

        Usuń

      </button>

      <button
        class="btn btn-primary btn-full"
        style="padding:14px"
        onclick="saveWorkoutSet()">

        💾 Zapisz

      </button>

    </div>

  </div>

</div>

<!-- ===== WORKOUT ===== -->

<div class="screen" id="screen-workout">

  <div class="workout-bg">

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="exercise-counter">

      <span class="ex-count-label" id="ex-counter-text"></span>

      <button
        class="btn btn-secondary btn-sm"
        onclick="stopWorkout()">

        Stop

      </button>

    </div>

    <div class="workout-main" id="workout-main"></div>

    <div id="next-section"></div>

    <div class="bottom-bar" id="workout-bottom-bar"></div>

  </div>

</div>

<!-- ===== FINISH ===== -->

<div class="finish-overlay" id="screen-finish">

  <div style="font-size:72px;margin-bottom:12px">🏆</div>

  <div class="finish-title">Ukończono!</div>

  <p style="color:var(--text2)">Dobra robota 👏</p>

  <div class="finish-stats" id="finish-stats"></div>

  <button
    class="btn btn-primary btn-full"
    style="padding:14px"
    onclick="showScreen('screen-home')">

    ← Powrót

  </button>

</div>

<script>

/* =========================================================
   SAMPLE SETS ZAWSZE Z HTML
========================================================= */

const SAMPLE_SETS = [

{
  id:'sample1',
  sample:true,
  name:'Poranna rutyna',
  exercises:[
    {id:'e1',name:'Krążenia głową w prawo',type:'time',duration:30},
    {id:'e2',name:'Krążenia głową w lewo',type:'time',duration:30},
    {id:'e3',name:'Krążenia barków do tyłu',type:'time',duration:30},
    {id:'e4',name:'Krążenia barków do przodu',type:'time',duration:30},
    {id:'e5',name:'Krążenia bioder',type:'time',duration:30},
    {id:'e6',name:'Krążenia kolan',type:'time',duration:30},
    {id:'e7',name:'Krążenia stóp',type:'time',duration:30}
  ]
},

{
  id:'sample2',
  sample:true,
  name:'Core',
  exercises:[
    {id:'c1',name:'Plank',type:'time',duration:60},
    {id:'c2',name:'Brzuszki',type:'reps',reps:20},
    {id:'c3',name:'Superman',type:'time',duration:30},
    {id:'c4',name:'Leg raises',type:'reps',reps:12}
  ]
}

];

/* =========================================================
   STORAGE
========================================================= */

const STORAGE_KEY = 'user_workout_sets_v3';

let workoutSets = [];

function loadData(){

  let userSets = [];

  try{

    const raw = localStorage.getItem(STORAGE_KEY);

    userSets = raw ? JSON.parse(raw) : [];

    if(!Array.isArray(userSets)){
      userSets = [];
    }

  }catch(e){

    userSets = [];

  }

  // SAMPLE ZAWSZE Z HTML
  workoutSets = [

    ...SAMPLE_SETS,

    ...userSets

  ];

}

function saveUserSets(){

  const onlyUserSets = workoutSets.filter(s => !s.sample);

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(onlyUserSets)
  );

}

/* =========================================================
   GLOBAL STATE
========================================================= */

let currentSetId = null;
let currentExercises = [];
let editingExType = 'reps';

const PREP_TIME = 10;
const COUNTDOWN_AT = 5;

let wState = {
  exercises:[],
  currentIdx:0,
  phase:'prep',
  timer:null,
  timeLeft:0,
  prepTimeLeft:0,
  startTime:null
};

/* =========================================================
   SCREEN
========================================================= */

function showScreen(id){

  document
    .querySelectorAll('.screen,.finish-overlay')
    .forEach(el => el.classList.remove('active'));

  document
    .getElementById(id)
    .classList.add('active');

  if(id === 'screen-home'){
    renderHome();
  }

}

/* =========================================================
   HOME
========================================================= */

function renderHome(){

  const el = document.getElementById('home-list');

  if(workoutSets.length === 0){

    el.innerHTML = `
      <div class="empty-state">
        Brak treningów
      </div>
    `;

    return;
  }

  el.innerHTML =
  `
  <p class="section-title">Moje treningi</p>
  `

  +

  workoutSets.map(set => `

    <div
      class="card"
      onclick="openEditSet('${set.id}')">

      <div class="card-row">

        <div class="card-icon">
          ${getSetEmoji(set)}
        </div>

        <div class="card-info">

          <h3>${set.name}</h3>

          <p>
            ${set.exercises.length} ćwiczeń ·
            ${getSetDuration(set)} min
          </p>

        </div>

        <button
          class="btn btn-primary btn-sm"
          onclick="event.stopPropagation();startWorkout('${set.id}')">

          ▶ Start

        </button>

      </div>

    </div>

  `).join('');

}

function getSetEmoji(set){

  const allTime = set.exercises.every(e => e.type === 'time');
  const allReps = set.exercises.every(e => e.type === 'reps');

  if(allTime) return '⏱️';
  if(allReps) return '🔢';

  return '⚡';

}

function getSetDuration(set){

  let secs = 0;

  set.exercises.forEach(ex => {

    secs += 10;

    if(ex.type === 'time'){
      secs += ex.duration || 30;
    }else{
      secs += 45;
    }

  });

  return Math.ceil(secs / 60);

}

/* =========================================================
   CREATE / EDIT
========================================================= */

function showCreateScreen(){

  currentSetId = null;
  currentExercises = [];

  document.getElementById('set-name').value = '';

  document.getElementById('create-title').textContent =
    'Nowy zestaw';

  document.getElementById('delete-set-btn').style.display =
    'none';

  renderExercisesList();

  hideAddPanel();

  showScreen('screen-create');

}

function openEditSet(id){

  const set = workoutSets.find(s => s.id === id);

  if(!set) return;

  // sample można edytować jako kopię
  if(set.sample){

    currentSetId = null;

    document.getElementById('create-title').textContent =
      'Kopia zestawu';

    document.getElementById('delete-set-btn').style.display =
      'none';

  }else{

    currentSetId = id;

    document.getElementById('create-title').textContent =
      'Edytuj zestaw';

    document.getElementById('delete-set-btn').style.display =
      'block';

  }

  currentExercises =
    JSON.parse(JSON.stringify(set.exercises));

  document.getElementById('set-name').value =
    set.name;

  renderExercisesList();

  hideAddPanel();

  showScreen('screen-create');

}

function renderExercisesList(){

  const el = document.getElementById('exercises-list');

  if(currentExercises.length === 0){

    el.innerHTML = `
      <div class="empty-state">
        Dodaj ćwiczenia
      </div>
    `;

    return;
  }

  el.innerHTML = currentExercises.map((ex,i)=>`

    <div class="ex-item">

      <div style="color:var(--text3)">
        ${i+1}
      </div>

      <div style="flex:1">

        <div class="ex-name">
          ${ex.name}
        </div>

        <div class="ex-meta">

          ${ex.type === 'time'
            ? '⏱ ' + ex.duration + 's'
            : '🔢 ' + ex.reps + ' powtórzeń'
          }

        </div>

      </div>

      <button
        class="ex-del"
        onclick="removeExercise(${i})">

        ✕
      </button>

    </div>

  `).join('');

}

function removeExercise(i){

  currentExercises.splice(i,1);

  renderExercisesList();

}

function showAddExercise(){

  document.getElementById('add-exercise-panel')
    .style.display = 'flex';

}

function hideAddPanel(){

  document.getElementById('add-exercise-panel')
    .style.display = 'none';

}

function selectType(type){

  editingExType = type;

  document
    .getElementById('chip-reps')
    .classList.toggle('active', type === 'reps');

  document
    .getElementById('chip-time')
    .classList.toggle('active', type === 'time');

  document
    .getElementById('reps-fields')
    .style.display =
      type === 'reps' ? 'block' : 'none';

  document
    .getElementById('time-fields')
    .style.display =
      type === 'time' ? 'block' : 'none';

}

function addExercise(){

  const name =
    document.getElementById('ex-name-inp')
    .value
    .trim();

  if(!name) return;

  const desc =
    document.getElementById('ex-desc-inp')
    .value
    .trim();

  const ex = {
    id:'ex_' + Date.now(),
    name,
    desc,
    type:editingExType
  };

  if(editingExType === 'time'){

    ex.duration =
      parseInt(
        document.getElementById('ex-time-inp').value
      ) || 30;

  }else{

    ex.reps =
      parseInt(
        document.getElementById('ex-reps-inp').value
      ) || 10;

  }

  currentExercises.push(ex);

  renderExercisesList();

  hideAddPanel();

}

function saveWorkoutSet(){

  const name =
    document.getElementById('set-name')
    .value
    .trim();

  if(!name){
    alert('Podaj nazwę');
    return;
  }

  if(currentExercises.length === 0){
    alert('Dodaj ćwiczenia');
    return;
  }

  if(currentSetId){

    const idx =
      workoutSets.findIndex(s => s.id === currentSetId);

    if(idx > -1){

      workoutSets[idx].name = name;
      workoutSets[idx].exercises = currentExercises;

    }

  }else{

    workoutSets.push({
      id:'set_' + Date.now(),
      name,
      exercises:currentExercises
    });

  }

  saveUserSets();

  showScreen('screen-home');

}

function deleteCurrentSet(){

  if(!currentSetId) return;

  if(!confirm('Usunąć zestaw?')) return;

  workoutSets =
    workoutSets.filter(s => s.id !== currentSetId);

  saveUserSets();

  showScreen('screen-home');

}

/* =========================================================
   WORKOUT
========================================================= */

function startWorkout(id){

  const set =
    workoutSets.find(s => s.id === id);

  if(!set) return;

  clearInterval(wState.timer);

  wState = {
    exercises:set.exercises,
    currentIdx:0,
    phase:'prep',
    timer:null,
    timeLeft:0,
    prepTimeLeft:PREP_TIME,
    startTime:Date.now()
  };

  showScreen('screen-workout');

  startPrepPhase();

}

function startPrepPhase(){

  wState.phase = 'prep';
  wState.prepTimeLeft = PREP_TIME;

  renderWorkoutUI();

  clearInterval(wState.timer);

  wState.timer = setInterval(()=>{

    wState.prepTimeLeft--;

    if(wState.prepTimeLeft <= 0){

      clearInterval(wState.timer);

      startActivePhase();

    }

    renderWorkoutUI();

  },1000);

}

function startActivePhase(){

  const ex =
    wState.exercises[wState.currentIdx];

  wState.phase = 'active';

  if(ex.type === 'reps'){

    renderWorkoutUI();

    return;

  }

  wState.timeLeft = ex.duration;

  renderWorkoutUI();

  clearInterval(wState.timer);

  wState.timer = setInterval(()=>{

    wState.timeLeft--;

    if(wState.timeLeft <= 0){

      clearInterval(wState.timer);

      advanceExercise();

    }

    renderWorkoutUI();

  },1000);

}

function advanceExercise(){

  wState.currentIdx++;

  if(wState.currentIdx >= wState.exercises.length){

    finishWorkout();

  }else{

    startPrepPhase();

  }

}

function repsDone(){

  advanceExercise();

}

function stopWorkout(){

  clearInterval(wState.timer);

  showScreen('screen-home');

}

function finishWorkout(){

  clearInterval(wState.timer);

  const elapsed =
    Math.round((Date.now() - wState.startTime)/1000);

  const mins = Math.floor(elapsed/60);
  const secs = elapsed % 60;

  document.getElementById('finish-stats').innerHTML = `

    <div class="stat-card">
      <div class="stat-val">
        ${wState.exercises.length}
      </div>
      <div class="stat-label">
        Ćwiczeń
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-val">
        ${mins}:${String(secs).padStart(2,'0')}
      </div>
      <div class="stat-label">
        Czas
      </div>
    </div>

  `;

  document
    .querySelectorAll('.screen,.finish-overlay')
    .forEach(el => el.classList.remove('active'));

  document
    .getElementById('screen-finish')
    .classList.add('active');

}

/* =========================================================
   RENDER WORKOUT UI
========================================================= */

function renderWorkoutUI(){

  const ex =
    wState.exercises[wState.currentIdx];

  const nextEx =
    wState.exercises[wState.currentIdx + 1];

  const total =
    wState.exercises.length;

  const progress =
    ((wState.currentIdx + 0.5) / total) * 100;

  document.getElementById('progress-fill')
    .style.width = progress + '%';

  document.getElementById('ex-counter-text')
    .textContent =
      `Ćwiczenie ${wState.currentIdx + 1} z ${total}`;

  const main =
    document.getElementById('workout-main');

  const bottom =
    document.getElementById('workout-bottom-bar');

  const nextSection =
    document.getElementById('next-section');

  if(wState.phase === 'prep'){

    const t = wState.prepTimeLeft;

    const dashTotal = 565;

    const dashOffset =
      dashTotal -
      (dashTotal * t / PREP_TIME);

    main.innerHTML = `

      <div class="phase-label" style="color:var(--orange)">
        Przygotuj się
      </div>

      <div class="ex-name-big">
        ${ex.name}
      </div>

      <div class="timer-wrap ${t <= COUNTDOWN_AT ? 'countdown-pulse' : ''}">

        <svg class="timer-svg" width="200" height="200">

          <circle
            class="timer-track"
            cx="100"
            cy="100"
            r="90"/>

          <circle
            class="timer-arc"
            cx="100"
            cy="100"
            r="90"
            stroke="${t <= COUNTDOWN_AT ? '#ff3b3b' : '#ff6b2b'}"
            stroke-dasharray="${dashTotal}"
            stroke-dashoffset="${dashOffset}"/>

        </svg>

        <div class="timer-text">

          <div class="timer-num">
            ${t}
          </div>

          <div class="timer-unit">
            sek
          </div>

        </div>

      </div>

    `;

    bottom.innerHTML = `
      <button
        class="btn btn-primary btn-full"
        style="padding:16px"
        onclick="clearInterval(wState.timer);startActivePhase()">

        Start teraz

      </button>
    `;

  }else{

    if(ex.type === 'reps'){

      main.innerHTML = `

        <div class="phase-label">
          Powtórzenia
        </div>

        <div class="ex-name-big">
          ${ex.name}
        </div>

        <div class="reps-display">
          ${ex.reps}
        </div>

      `;

      bottom.innerHTML = `
        <button
          class="btn btn-primary btn-full btn-large"
          onclick="repsDone()">

          ZROBIONE

        </button>
      `;

    }else{

      const t = wState.timeLeft;

      const dashTotal = 565;

      const dashOffset =
        dashTotal -
        (dashTotal * t / ex.duration);

      main.innerHTML = `

        <div class="phase-label">
          Czas
        </div>

        <div class="ex-name-big">
          ${ex.name}
        </div>

        <div class="timer-wrap ${t <= COUNTDOWN_AT ? 'countdown-pulse' : ''}">

          <svg class="timer-svg" width="200" height="200">

            <circle
              class="timer-track"
              cx="100"
              cy="100"
              r="90"/>

            <circle
              class="timer-arc"
              cx="100"
              cy="100"
              r="90"
              stroke="${t <= COUNTDOWN_AT ? '#ff3b3b' : '#2eff8a'}"
              stroke-dasharray="${dashTotal}"
              stroke-dashoffset="${dashOffset}"/>

          </svg>

          <div class="timer-text">

            <div class="timer-num">
              ${t}
            </div>

            <div class="timer-unit">
              sek
            </div>

          </div>

        </div>

      `;

      bottom.innerHTML = `
        <button
          class="btn btn-secondary btn-full"
          style="padding:16px"
          onclick="clearInterval(wState.timer);advanceExercise()">

          Pomiń

        </button>
      `;

    }

  }

  if(nextEx){

    nextSection.innerHTML = `

      <div class="next-preview">

        <div class="next-icon">
          ${nextEx.type === 'time' ? '⏱️' : '🔢'}
        </div>

        <div style="flex:1">

          <div class="next-label">
            Następne
          </div>

          <div class="next-name">
            ${nextEx.name}
          </div>

        </div>

      </div>

    `;

  }else{

    nextSection.innerHTML = '';

  }

}

/* =========================================================
   INIT
========================================================= */

loadData();
renderHome();

</script>
