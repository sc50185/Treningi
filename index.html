<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Barlow',sans-serif;
  background:#0a0a0f;
  color:#f0ede8;
  min-height:100vh;
  overflow-x:hidden;
}

:root{
  --green:#2eff8a;
  --orange:#ff6b2b;
  --blue:#3b8aff;
  --red:#ff3b3b;

  --bg:#0a0a0f;
  --bg2:#141419;
  --bg3:#1e1e26;
  --bg4:#28282f;

  --border:#2a2a35;

  --text:#f0ede8;
  --text2:#9994a0;
  --text3:#5a5568;

  --radius:12px;
  --radius-lg:18px;
}

.screen{
  display:none;
  flex-direction:column;
  min-height:100vh;
}

.screen.active{
  display:flex;
}

.header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:16px 20px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:10;
}

.header h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
  font-weight:800;
  letter-spacing:1px;
  text-transform:uppercase;
  flex:1;
}

.back-btn{
  background:none;
  border:none;
  color:var(--text2);
  font-size:22px;
  cursor:pointer;
}

.content{
  flex:1;
  padding:16px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  cursor:pointer;
}

.card-row{
  display:flex;
  align-items:center;
  gap:12px;
}

.card-icon{
  width:42px;
  height:42px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg3);
  font-size:18px;
}

.card-info{
  flex:1;
}

.card-info h3{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;
  font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
}

.card-info p{
  font-size:13px;
  color:var(--text2);
  margin-top:2px;
}

.card-arrow{
  color:var(--text3);
  font-size:18px;
}

.btn{
  border:none;
  border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
}

.btn-primary{
  background:var(--green);
  color:#000;
  padding:14px 24px;
}

.btn-secondary{
  background:var(--bg3);
  color:var(--text);
  padding:12px 20px;
  border:1px solid var(--border);
}

.btn-orange{
  background:var(--orange);
  color:#fff;
  padding:14px 24px;
}

.btn-sm{
  font-size:14px;
  padding:8px 14px;
  border-radius:8px;
}

.btn-full{
  width:100%;
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.input-group label{
  font-size:13px;
  font-weight:600;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:.5px;
}

.inp{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-size:15px;
  padding:11px 14px;
  width:100%;
  outline:none;
}

.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.chip{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 14px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}

.chip.active{
  background:var(--green);
  color:#000;
  border-color:var(--green);
}

.section-title{
  font-size:13px;
  color:var(--text2);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.divider{
  height:1px;
  background:var(--border);
  margin:4px 0;
}

.bottom-bar{
  padding:16px 20px 28px;
  background:var(--bg2);
  border-top:1px solid var(--border);
}

.row{
  display:flex;
  gap:10px;
}

.row>*{
  flex:1;
}

.ex-item{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.ex-del{
  color:var(--red);
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.workout-bg{
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.progress-bar{
  height:4px;
  background:var(--bg3);
}

.progress-fill{
  height:100%;
  background:var(--green);
  transition:width .4s ease;
}

.exercise-counter{
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.ex-count-label{
  font-size:13px;
  color:var(--text2);
  font-weight:600;
  text-transform:uppercase;
}

.workout-main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  text-align:center;
}

.phase-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--text2);
  margin-bottom:10px;
}

.ex-name-big{
  font-family:'Barlow Condensed',sans-serif;
  font-size:38px;
  font-weight:800;
  letter-spacing:1px;
  text-transform:uppercase;
  line-height:1.1;
  margin-bottom:10px;
}

.ex-desc{
  font-size:14px;
  color:var(--text2);
  margin-bottom:24px;
  max-width:280px;
  line-height:1.6;
}

.timer-wrap{
  position:relative;
  width:200px;
  height:200px;
  margin-bottom:24px;
}

.timer-svg{
  transform:rotate(-90deg);
}

.timer-track{
  fill:none;
  stroke:var(--bg3);
  stroke-width:10;
}

.timer-arc{
  fill:none;
  stroke-width:10;
  stroke-linecap:round;
  transition:stroke-dashoffset 1s linear;
}

.timer-text{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.timer-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:64px;
  font-weight:800;
  line-height:1;
}

.timer-unit{
  font-size:13px;
  color:var(--text2);
  text-transform:uppercase;
}

.reps-display{
  font-family:'Barlow Condensed',sans-serif;
  font-size:80px;
  font-weight:800;
  color:var(--green);
  margin:12px 0 24px;
}

.next-preview{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:14px 18px;
  width:100%;
  display:flex;
  align-items:center;
  gap:12px;
}

.next-icon{
  width:38px;
  height:38px;
  border-radius:9px;
  background:var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
}

.next-label{
  font-size:12px;
  color:var(--text2);
  text-transform:uppercase;
}

.next-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;
  font-weight:700;
  text-transform:uppercase;
}

.empty-state{
  text-align:center;
  padding:48px 20px;
  color:var(--text2);
}

.big-icon{
  font-size:52px;
  margin-bottom:12px;
}

.finish-overlay{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:32px;
  text-align:center;
}

.finish-overlay.active{
  display:flex;
}

.finish-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:42px;
  font-weight:800;
  text-transform:uppercase;
  color:var(--green);
  margin-bottom:12px;
}

.finish-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  width:100%;
  margin:24px 0 32px;
}

.stat-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px;
}

.stat-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;
  font-weight:800;
  color:var(--green);
}

.stat-label{
  font-size:12px;
  color:var(--text2);
  text-transform:uppercase;
}

.countdown-pulse{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.45}
}
</style>
</head>

<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="header">
    <h1>💪 Treningi</h1>
    <button class="btn btn-secondary btn-sm" onclick="showScreen_create_new()">+ Nowy trening</button>
  </div>

  <div class="content" id="home-list"></div>
</div>

<!-- CREATE -->
<div class="screen" id="screen-create">

  <div class="header">
    <button class="back-btn" onclick="showScreen('screen-home')">‹</button>
    <h1 id="create-title">Nowy zestaw</h1>
  </div>

  <div class="content">

    <div class="input-group">
      <label>Nazwa zestawu</label>
      <input class="inp" id="set-name">
    </div>

    <div class="divider"></div>

    <p class="section-title">Ćwiczenia</p>

    <div id="exercises-list"></div>

    <button class="btn btn-secondary btn-full" onclick="showAddExercise()">
      + Dodaj ćwiczenie
    </button>

    <div id="add-exercise-panel" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;flex-direction:column;gap:12px">

      <div class="input-group">
        <label>Nazwa</label>
        <input class="inp" id="ex-name-inp">
      </div>

      <div class="input-group">
        <label>Opis</label>
        <input class="inp" id="ex-desc-inp">
      </div>

      <div class="input-group">
        <label>Typ</label>

        <div class="chips">
          <div class="chip active" id="chip-reps" onclick="selectType('reps')">
            🔢 Powtórzenia
          </div>

          <div class="chip" id="chip-time" onclick="selectType('time')">
            ⏱️ Czas
          </div>
        </div>
      </div>

      <div id="reps-fields">

        <div class="input-group">
          <label>Powtórzenia</label>
          <input class="inp" id="ex-reps-inp" type="number" min="1">
        </div>

      </div>

      <div id="time-fields" style="display:none">

        <div class="input-group">
          <label>Czas ćwiczenia</label>
          <input class="inp" id="ex-time-inp" type="number" min="5">
        </div>

      </div>

      <div class="input-group">
        <label>Przygotowanie przed ćwiczeniem (sek)</label>
        <input class="inp" id="ex-prep-inp" type="number" min="0" value="10">
      </div>

      <div class="row">
        <button class="btn btn-secondary btn-sm" onclick="hideAddPanel()">Anuluj</button>
        <button class="btn btn-primary btn-sm" onclick="addExercise()">Dodaj</button>
      </div>

    </div>

  </div>

  <div class="bottom-bar">
    <div class="row">

      <button class="btn btn-secondary btn-sm" id="delete-set-btn" style="display:none;color:var(--red)" onclick="deleteCurrentSet()">
        Usuń
      </button>

      <button class="btn btn-primary btn-full" onclick="saveWorkoutSet()">
        Zapisz
      </button>

    </div>
  </div>

</div>

<!-- WORKOUT -->
<div class="screen" id="screen-workout">

  <div class="workout-bg">

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="exercise-counter">
      <span class="ex-count-label" id="ex-counter-text"></span>

      <button class="btn btn-secondary btn-sm" onclick="stopWorkout()">
        Stop
      </button>
    </div>

    <div class="workout-main" id="workout-main"></div>

    <div style="padding:0 20px 8px" id="next-section"></div>

    <div class="bottom-bar" id="workout-bottom-bar"></div>

  </div>

</div>

<!-- FINISH -->
<div class="finish-overlay" id="screen-finish">

  <div style="font-size:72px;margin-bottom:16px">🏆</div>

  <div class="finish-title">
    Trening ukończony
  </div>

  <div class="finish-stats" id="finish-stats"></div>

  <button class="btn btn-primary btn-full" onclick="showScreen('screen-home')">
    Powrót
  </button>

</div>

<script>
const STORAGE_KEY = 'custom_workout_sets_v3';
const COUNTDOWN_AT = 5;

let customSets = [];
let currentSetId = null;
let currentExercises = [];
let editingExType = 'reps';

const sampleSets = [
  {
    id:'sample1',
    sample:true,
    name:'Poranna rutyna',
    exercises:[
      {id:'e1',name:'Krążenia głową w prawo',type:'time',duration:30,prep:10},
      {id:'e2',name:'Krążenia głową w lewo',type:'time',duration:30,prep:10},
      {id:'e3',name:'Krążenia barków',type:'time',duration:30,prep:8},
      {id:'e4',name:'Krążenia bioder',type:'time',duration:30,prep:8},
      {id:'e5',name:'Krążenia kolan',type:'time',duration:30,prep:6},
    ]
  },

  {
    id:'sample2',
    sample:true,
    name:'Core',
    exercises:[
      {id:'c1',name:'Plank',type:'time',duration:60,prep:10},
      {id:'c2',name:'Brzuszki',type:'reps',reps:20,prep:8},
      {id:'c3',name:'Leg raises',type:'reps',reps:12,prep:8},
    ]
  }
];

function getAllSets(){
  return [...sampleSets, ...customSets];
}

function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(customSets));
}

function loadData(){
  try{
    customSets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  }catch(e){
    customSets = [];
  }
}

function showScreen(id){
  document.querySelectorAll('.screen,.finish-overlay').forEach(el=>{
    el.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');

  if(id === 'screen-home'){
    renderHome();
  }
}

function renderHome(){

  const sets = getAllSets();

  const list = document.getElementById('home-list');

  if(sets.length === 0){

    list.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">📋</div>
        <p>Brak treningów</p>
      </div>
    `;

    return;
  }

  list.innerHTML =
    `<p class="section-title">Moje treningi</p>` +

    sets.map(s=>`
      <div class="card" onclick="openEditSet('${s.id}')">

        <div class="card-row">

          <div class="card-icon">
            ${s.sample ? '⭐' : '💪'}
          </div>

          <div class="card-info">
            <h3>${s.name}</h3>
            <p>${s.exercises.length} ćwiczeń</p>
          </div>

          <button class="btn btn-primary btn-sm"
            onclick="event.stopPropagation();startWorkout('${s.id}')">
            ▶ Start
          </button>

        </div>

      </div>
    `).join('');
}

function showScreen_create_new(){

  currentSetId = null;
  currentExercises = [];

  document.getElementById('set-name').value = '';

  document.getElementById('create-title').textContent = 'Nowy zestaw';

  document.getElementById('delete-set-btn').style.display = 'none';

  renderExercisesList();

  hideAddPanel();

  showScreen('screen-create');
}

function openEditSet(id){

  const set = getAllSets().find(s=>s.id===id);

  if(set.sample){
    startWorkout(id);
    return;
  }

  currentSetId = id;

  currentExercises = JSON.parse(JSON.stringify(set.exercises));

  document.getElementById('set-name').value = set.name;

  document.getElementById('create-title').textContent = 'Edytuj zestaw';

  document.getElementById('delete-set-btn').style.display = 'flex';

  renderExercisesList();

  showScreen('screen-create');
}

function renderExercisesList(){

  const el = document.getElementById('exercises-list');

  if(currentExercises.length === 0){

    el.innerHTML = `
      <div class="empty-state" style="padding:24px 0">
        <div class="big-icon" style="font-size:32px">➕</div>
        <p style="font-size:13px">Dodaj ćwiczenia</p>
      </div>
    `;

    return;
  }

  el.innerHTML = currentExercises.map((ex,i)=>`

    <div class="ex-item">

      <div style="flex:1">

        <div style="font-weight:600">
          ${i+1}. ${ex.name}
        </div>

        <div style="font-size:13px;color:var(--text2);margin-top:4px">

          ${ex.type === 'time'
            ? `⏱ ${ex.duration}s`
            : `🔢 ${ex.reps} powt.`}

          · przygotowanie ${ex.prep || 0}s

        </div>

      </div>

      <button class="ex-del" onclick="removeExercise(${i})">
        ✕
      </button>

    </div>

  `).join('');
}

function removeExercise(i){
  currentExercises.splice(i,1);
  renderExercisesList();
}

function showAddExercise(){

  document.getElementById('add-exercise-panel').style.display = 'flex';

  document.getElementById('ex-name-inp').value = '';
  document.getElementById('ex-desc-inp').value = '';
  document.getElementById('ex-reps-inp').value = '';
  document.getElementById('ex-time-inp').value = '';
  document.getElementById('ex-prep-inp').value = '10';

  selectType('reps');
}

function hideAddPanel(){
  document.getElementById('add-exercise-panel').style.display = 'none';
}

function selectType(type){

  editingExType = type;

  document.getElementById('chip-reps').classList.toggle('active', type === 'reps');
  document.getElementById('chip-time').classList.toggle('active', type === 'time');

  document.getElementById('reps-fields').style.display =
    type === 'reps' ? 'block' : 'none';

  document.getElementById('time-fields').style.display =
    type === 'time' ? 'block' : 'none';
}

function addExercise(){

  const name =
    document.getElementById('ex-name-inp').value.trim();

  if(!name) return;

  const prep =
    parseInt(document.getElementById('ex-prep-inp').value) || 0;

  const ex = {
    id:'ex_'+Date.now(),
    name,
    type:editingExType,
    prep
  };

  if(editingExType === 'time'){
    ex.duration =
      parseInt(document.getElementById('ex-time-inp').value) || 30;
  }else{
    ex.reps =
      parseInt(document.getElementById('ex-reps-inp').value) || 10;
  }

  currentExercises.push(ex);

  renderExercisesList();

  hideAddPanel();
}

function saveWorkoutSet(){

  const name =
    document.getElementById('set-name').value.trim();

  if(!name) return;

  if(currentExercises.length === 0){
    alert('Dodaj ćwiczenia');
    return;
  }

  if(currentSetId){

    const idx =
      customSets.findIndex(s=>s.id===currentSetId);

    customSets[idx].name = name;
    customSets[idx].exercises = currentExercises;

  }else{

    customSets.push({
      id:'set_'+Date.now(),
      name,
      exercises:currentExercises
    });
  }

  saveData();

  showScreen('screen-home');
}

function deleteCurrentSet(){

  if(!currentSetId) return;

  customSets =
    customSets.filter(s=>s.id!==currentSetId);

  saveData();

  showScreen('screen-home');
}

let audioCtx = null;

function ensureAudio(){

  if(!audioCtx){

    const AudioContextClass =
      window.AudioContext || window.webkitAudioContext;

    if(AudioContextClass){
      audioCtx = new AudioContextClass();
    }
  }

  if(audioCtx && audioCtx.state === 'suspended'){
    audioCtx.resume();
  }
}

function playBeep(freq=900,duration=90,volume=0.03){

  try{

    ensureAudio();

    if(!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.value = freq;

    gain.gain.value = volume;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    setTimeout(()=>{
      osc.stop();
    }, duration);

  }catch(e){}
}

let wState = {
  exercises:[],
  currentIdx:0,
  phase:'prep',
  timer:null,
  timeLeft:0,
  startTime:0
};

function startWorkout(id){

  ensureAudio();

  const set =
    getAllSets().find(s=>s.id===id);

  if(!set) return;

  clearInterval(wState.timer);

  wState = {
    exercises:set.exercises,
    currentIdx:0,
    phase:'prep',
    timer:null,
    timeLeft:0,
    startTime:Date.now()
  };

  showScreen('screen-workout');

  startPrepPhase();
}

function startPrepPhase(){

  const ex = wState.exercises[wState.currentIdx];

  wState.phase = 'prep';
  wState.timeLeft = ex.prep || 0;

  renderWorkoutUI();

  clearInterval(wState.timer);

  if(wState.timeLeft <= 0){
    startActivePhase();
    return;
  }

  wState.timer = setInterval(()=>{

    wState.timeLeft--;

    if(
      wState.timeLeft <= COUNTDOWN_AT &&
      wState.timeLeft > 0
    ){

      if(wState.timeLeft === 1){
        playBeep(1400,120,0.05);
      }else{
        playBeep(900,70,0.03);
      }

      navigator.vibrate?.(40);
    }

    renderWorkoutUI();

    if(wState.timeLeft <= 0){

      clearInterval(wState.timer);

      playBeep(1700,180,0.06);

      navigator.vibrate?.([80,40,80]);

      startActivePhase();
    }

  },1000);
}

function startActivePhase(){

  const ex = wState.exercises[wState.currentIdx];

  wState.phase = 'active';

  if(ex.type === 'reps'){
    renderWorkoutUI();
    return;
  }

  wState.timeLeft = ex.duration;

  renderWorkoutUI();

  clearInterval(wState.timer);

  wState.timer = setInterval(()=>{

    wState.timeLeft--;

    if(
      wState.timeLeft <= COUNTDOWN_AT &&
      wState.timeLeft > 0
    ){

      if(wState.timeLeft === 1){
        playBeep(1400,120,0.05);
      }else{
        playBeep(950,70,0.03);
      }

      navigator.vibrate?.(40);
    }

    renderWorkoutUI();

    if(wState.timeLeft <= 0){

      clearInterval(wState.timer);

      playBeep(1700,180,0.06);

      navigator.vibrate?.([100,50,100]);

      advanceExercise();
    }

  },1000);
}

function advanceExercise(){

  wState.currentIdx++;

  if(wState.currentIdx >= wState.exercises.length){
    finishWorkout();
  }else{
    startPrepPhase();
  }
}

function repsDone(){
  advanceExercise();
}

function stopWorkout(){

  clearInterval(wState.timer);

  showScreen('screen-home');
}

function finishWorkout(){

  clearInterval(wState.timer);

  const elapsed =
    Math.round((Date.now()-wState.startTime)/1000);

  const mins = Math.floor(elapsed/60);
  const secs = elapsed % 60;

  document.getElementById('finish-stats').innerHTML = `

    <div class="stat-card">
      <div class="stat-val">
        ${wState.exercises.length}
      </div>

      <div class="stat-label">
        Ćwiczeń
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-val">
        ${mins}:${String(secs).padStart(2,'0')}
      </div>

      <div class="stat-label">
        Czas
      </div>
    </div>

  `;

  document.querySelectorAll('.screen,.finish-overlay').forEach(el=>{
    el.classList.remove('active');
  });

  document.getElementById('screen-finish').classList.add('active');
}

function renderWorkoutUI(){

  const ex =
    wState.exercises[wState.currentIdx];

  const total =
    wState.exercises.length;

  const nextEx =
    wState.exercises[wState.currentIdx + 1];

  const progress =
    ((wState.currentIdx + (wState.phase === 'active' ? .5 : 0)) / total) * 100;

  document.getElementById('progress-fill').style.width =
    progress + '%';

  document.getElementById('ex-counter-text').textContent =
    `Ćwiczenie ${wState.currentIdx+1} z ${total}`;

  const main =
    document.getElementById('workout-main');

  const bottom =
    document.getElementById('workout-bottom-bar');

  const nextSection =
    document.getElementById('next-section');

  if(wState.phase === 'prep'){

    const t = wState.timeLeft;

    const dashTotal = 565;

    const dashOffset =
      dashTotal - (dashTotal * t / (ex.prep || 1));

    const countdown =
      t <= COUNTDOWN_AT;

    main.innerHTML = `

      <div class="phase-label" style="color:var(--orange)">
        Przygotuj się
      </div>

      <div class="ex-name-big" style="color:var(--orange)">
        ${ex.name}
      </div>

      <div class="timer-wrap ${countdown ? 'countdown-pulse' : ''}">

        <svg class="timer-svg" width="200" height="200" viewBox="0 0 200 200">

          <circle class="timer-track" cx="100" cy="100" r="90"/>

          <circle
            class="timer-arc"
            cx="100"
            cy="100"
            r="90"
            stroke="${countdown ? '#ff3b3b' : '#ff6b2b'}"
            stroke-dasharray="${dashTotal}"
            stroke-dashoffset="${dashOffset}"
          />

        </svg>

        <div class="timer-text">

          <div class="timer-num"
            style="color:${countdown ? 'var(--red)' : 'var(--orange)'}">
            ${t}
          </div>

          <div class="timer-unit">
            sek
          </div>

        </div>

      </div>
    `;

    bottom.innerHTML = `
      <button class="btn btn-orange btn-full"
        onclick="clearInterval(wState.timer);startActivePhase()">
        Start teraz
      </button>
    `;

  }else{

    if(ex.type === 'reps'){

      main.innerHTML = `

        <div class="phase-label" style="color:var(--green)">
          Wykonaj
        </div>

        <div class="ex-name-big">
          ${ex.name}
        </div>

        <div class="reps-display">
          ${ex.reps}
        </div>

      `;

      bottom.innerHTML = `
        <button class="btn btn-primary btn-full"
          style="font-size:22px;padding:18px"
          onclick="repsDone()">
          Zrobione
        </button>
      `;

    }else{

      const t = wState.timeLeft;

      const dashTotal = 565;

      const dashOffset =
        dashTotal - (dashTotal * t / ex.duration);

      const countdown =
        t <= COUNTDOWN_AT;

      main.innerHTML = `

        <div class="phase-label" style="color:var(--green)">
          Czas
        </div>

        <div class="ex-name-big">
          ${ex.name}
        </div>

        <div class="timer-wrap ${countdown ? 'countdown-pulse' : ''}">

          <svg class="timer-svg" width="200" height="200" viewBox="0 0 200 200">

            <circle class="timer-track" cx="100" cy="100" r="90"/>

            <circle
              class="timer-arc"
              cx="100"
              cy="100"
              r="90"
              stroke="${countdown ? '#ff3b3b' : '#2eff8a'}"
              stroke-dasharray="${dashTotal}"
              stroke-dashoffset="${dashOffset}"
            />

          </svg>

          <div class="timer-text">

            <div class="timer-num"
              style="color:${countdown ? 'var(--red)' : 'var(--green)'}">
              ${t}
            </div>

            <div class="timer-unit">
              sek
            </div>

          </div>

        </div>
      `;

      bottom.innerHTML = `
        <button class="btn btn-secondary btn-full"
          onclick="clearInterval(wState.timer);advanceExercise()">
          Pomiń
        </button>
      `;
    }
  }

  if(nextEx){

    nextSection.innerHTML = `

      <div class="next-preview">

        <div class="next-icon">
          ${nextEx.type === 'time' ? '⏱️' : '🔢'}
        </div>

        <div style="flex:1">

          <div class="next-label">
            Następne
          </div>

          <div class="next-name">
            ${nextEx.name}
          </div>

        </div>

      </div>

    `;

  }else{

    nextSection.innerHTML = `
      <div class="next-preview">
        <div class="next-icon">🏁</div>

        <div style="flex:1">

          <div class="next-label">
            Ostatnie ćwiczenie
          </div>

          <div class="next-name">
            Dobra robota!
          </div>

        </div>

      </div>
    `;
  }
}

loadData();
renderHome();

document.body.addEventListener('touchstart', ensureAudio, {once:true});
document.body.addEventListener('click', ensureAudio, {once:true});
</script>

</body>
</html>
